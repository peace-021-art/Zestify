<!DOCTYPE html>
<html>
<head>
  <title>Agentation Settings</title>
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      width: 300px;
      margin: 0;
      padding: 16px;
      background-color: #0f172a;
      color: #f8fafc;
    }
    h1 {
      font-size: 18px;
      margin-top: 0;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #a5b4fc 0%, #c4b5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 16px;
    }
    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .toggle-label {
      font-size: 14px;
      font-weight: 500;
    }
    /* Simple CSS Toggle Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 24px;
    }
    .switch input { 
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #334155;
      transition: .4s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #6366f1;
    }
    input:checked + .slider:before {
      transform: translateX(16px);
    }
  </style>
</head>
<body>
  <h1>Agentation Toolbar</h1>
  <p>Customize your AI assistant experience.</p>
  
  <div class="toggle-container">
    <span class="toggle-label">Enable Toolbar</span>
    <label class="switch">
      <input type="checkbox" checked id="enable-toggle">
      <span class="slider"></span>
    </label>
  </div>
  
  <div class="toggle-container">
    <span class="toggle-label">Auto-Summarize Pages</span>
    <label class="switch">
      <input type="checkbox" id="summarize-toggle">
      <span class="slider"></span>
    </label>
  </div>

</body>
</html>
